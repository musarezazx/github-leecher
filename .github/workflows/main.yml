name:  انتقال فایل به گیت هاب

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل فشرده'
        required: true
        type: string

permissions:
  contents: write

jobs:
  leech-split-file: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # آپدیت شده به v5
        with:
          fetch-depth: 1 

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          echo "File downloaded. Size: $(ls -lh downloaded_file | awk '{print $5}')"

      - name: Extract original filename
        id: get_filename
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file_archive" # نام پیش‌فرض اگر قابل استخراج نبود
          echo "Original filename will be used for archive: $ORIGINAL_NAME"
          echo "::set-output name=original_name::$ORIGINAL_NAME" # برای استفاده در مراحل بعدی

      - name: Create password-protected multi-part archive (85MB chunks)
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v85m "sci-hub.ir_${{ steps.get_filename.outputs.original_name }}.7z" downloaded_file
          echo "Archive created successfully."

      - name: Remove original downloaded file
        run: rm -f downloaded_file

      # کانفیگ Git برای استفاده از اکانت گیت‌هاب اکشن
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" # استفاده از GITHUB_TOKEN برای احراز هویت

      # آماده‌سازی برای Push کردن
      - name: Prepare for commit
        run: |
          # افزودن تمام فایل‌های آرشیو به Git
          git add sci-hub.ir_${{ steps.get_filename.outputs.original_name }}.7z.*
          echo "Added archive chunks to staging."

      - name: Commit and Push chunks (up to 10 per batch)
        run: |
          # استفاده از Git commands برای مدیریت batch ها
          chunks=("sci-hub.ir_${steps.get_filename.outputs.original_name}.7z".*)
          total=${#chunks[@]}
          batch_size=10
          start=0

          if [ $total -eq 0 ]; then
            echo "No archive chunks found to push."
            exit 0
          fi

          echo "Total chunks to push: $total"

          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))

            echo "Processing chunks $start to $end (out of $total)..."

            # Commit کردن تکه‌های این بسته
            commit_message="Add chunks $((start+1))-$((end+1)) of $total"
            git commit -m "$commit_message"

            # Push کردن با تلاش مجدد
            push_success=false
            for attempt in {1..9}; do
              echo "Attempt $attempt to push..."
              if git push origin HEAD --force-with-lease; then # استفاده از HEAD و force-with-lease برای اطمینان از عدم تداخل
                echo "Push successful."
                push_success=true
                break
              else
                echo "Push failed on attempt $attempt. Retrying in 10 seconds..."
                sleep 10
                # ممکن است لازم باشد قبل از تلاش مجدد، git pull یا rebase انجام شود، ولی برای workflow های ساده معمولا لازم نیست
              fi
            done

            if [ "$push_success" = false ]; then
              echo "Failed to push chunks after multiple attempts. Aborting."
              exit 1 # پایان دادن به workflow با خطا
            fi

            # اگر آخرین بسته بود، حلقه تمام شده
            if [ $end -eq $((total - 1)) ]; then
              break
            fi

            # رفتن به بسته بعدی
            start=$((end + 1))
            echo "Waiting 5 seconds before next batch..."
            sleep 5
          done

     
